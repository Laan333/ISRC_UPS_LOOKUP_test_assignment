services:
  nginx:
    build: ./nginx
    ports:
      # Host port for HTTP (set NGINX_HTTP_PORT=8080 in .env if 80 is taken, e.g. on Windows)
      - "${NGINX_HTTP_PORT:-80}:80"
      # HTTPS (active only when NGINX_SSL_ENABLED=true and PEM files are mounted)
      - "${NGINX_HTTPS_PORT:-443}:443"
    environment:
      NGINX_SSL_ENABLED: ${NGINX_SSL_ENABLED:-false}
      NGINX_SSL_CERT: ${NGINX_SSL_CERT:-/etc/nginx/ssl/fullchain.pem}
      NGINX_SSL_KEY: ${NGINX_SSL_KEY:-/etc/nginx/ssl/privkey.pem}
    volumes:
      - ./logs/nginx:/var/log/nginx
      - ${NGINX_SSL_CERT_DIR:-./certs}:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: .
    expose:
      - "8000"
    ports:
      # Direct access to uvicorn (optional; nginx listens on NGINX_HTTP_PORT)
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    environment:
      USER_AGENT: "ISRC_UPS_Lookup/1.0 (docker)"
      # Values are read from a project ".env" file next to this compose file (Compose interpolation).
      OPENAPI_SERVER_URL: ${OPENAPI_SERVER_URL:-http://127.0.0.1:8000}
      READY_CHECK_URL: ${READY_CHECK_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE_PATH: ${LOG_FILE_PATH:-logs/app.log}
      LOG_MAX_BYTES: ${LOG_MAX_BYTES:-5000000}
      LOG_BACKUP_COUNT: ${LOG_BACKUP_COUNT:-5}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
